<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">
                SMS Admin
            </div>
            <ul>
                <li class="active"
                    onclick="showPage('dashboardPage', this)">
                    <span>Dashboard</span>
                </li>
                <li onclick="showPage('studentsPage', this)">
                    <span>Students</span>
                </li>
                <li onclick="showPage('analyticsPage', this)">
                    <span>Analytics</span>
                </li>
                <li onclick="showPage('settingsPage', this)">
                    <span>Settings</span>
                </li>
            </ul>
        </aside>
        <main class="main">
            <div class="topbar">
                <h1>Student Dashboard</h1>
                <div class="topbar-right">
                    <div class="search-box">
                        <input type="text"
                            id="search"
                            placeholder="Search student..."
                            onkeyup="searchStudent()">
                    </div>
                    <select id="sortSelect"
                        onchange="sortStudents()">
                        <option value="">Sort</option>
                        <option value="asc">A-Z</option>
                        <option value="desc">Z-A</option>
                    </select>
                </div>
            </div>
            <div class="page active"
                id="dashboardPage">
                <div class="cards">
                    <div class="card">
                        <div class="card-title">
                            Total Students
                        </div>
                        <div class="card-value"
                            id="totalStudents">
                            0
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-title">
                            Total Courses
                        </div>
                        <div class="card-value">
                            5
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-title">
                            Active Students
                        </div>
                        <div class="card-value">
                            100%
                        </div>
                    </div>
                </div>
            </div>
            <div class="page"
                id="studentsPage">
                <div class="form-container">
                    <div class="form">
                        <input type="text"
                            id="studentId"
                            placeholder="Student ID">
                        <input type="text"
                            id="firstName"
                            placeholder="First Name">
                        <input type="text"
                            id="lastName"
                            placeholder="Last Name">
                        <input type="number"
                            id="age"
                            placeholder="Age">
                        <input type="text"
                            id="course"
                            placeholder="Course">
                        <input type="text"
                            id="phone"
                            placeholder="Phone">
                        <button class="add-btn"
                            onclick="addStudent()">
                            Add Student
                        </button>
                    </div>
                </div>
                <div class="table-wrapper">
                    <div class="table-scroll">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>First Name</th>
                                    <th>Last Name</th>
                                    <th>Age</th>
                                    <th>Course</th>
                                    <th>Phone</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="studentsTable">
                            </tbody>
                        </table>
                    </div>
                </div>
                <div id="pagination"></div>
            </div>
            <div class="page"
                id="analyticsPage">
                <div class="card">
                    <div class="card-title">
                        Analytics
                    </div>
                    <div class="card-value">
                        Coming Soon
                    </div>
                </div>
            </div>
            <div class="page"
                id="settingsPage">
                <div class="card">
                    <div class="card-title">
                        Settings
                    </div>
                    <div class="card-value">
                        Dashboard Settings
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div class="modal"
        id="editModal">
        <div class="modal-content">
            <h2>Edit Student</h2>
            <input type="text"
                id="editStudentId"
                placeholder="ID">
            <input type="text"
                id="editFirstName"
                placeholder="First Name">
            <input type="text"
                id="editLastName"
                placeholder="Last Name">
            <input type="number"
                id="editAge"
                placeholder="Age">
            <input type="text"
                id="editCourse"
                placeholder="Course">
            <input type="text"
                id="editPhone"
                placeholder="Phone">
            <button onclick="updateStudent()">
                Save Changes
            </button>
            <button onclick="closeModal()">
                Close
            </button>
        </div>
    </div>
    <div id="toast"></div>
    <script src="app.js"></script>
</body>
</html>
